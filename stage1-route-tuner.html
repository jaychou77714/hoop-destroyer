<!DOCTYPE html><html lang="zh-Hant"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>第1幕 灰哨修院 · 遠征頁調校台</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#15101c;color:#e9e0d2;font-family:-apple-system,"PingFang TC","Noto Serif TC",sans-serif}
  .wrap{max-width:1100px;margin:0 auto;padding:10px}
  h1{font-size:16px;margin:6px 2px;color:#f4d47a}
  .hint{font-size:12px;color:#a99;margin:0 2px 8px;line-height:1.55}
  #stage{position:relative;width:100%;background:#000;border:1px solid #3a2f1a;border-radius:8px;overflow:hidden;touch-action:none}
  canvas{display:block;width:100%;height:auto}
  .row{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
  .tbtn{flex:1 1 auto;min-width:62px;padding:8px 4px;border:1px solid #4a3d22;background:#241c14;color:#d8ccb6;border-radius:7px;font-size:13px;font-weight:700}
  .tbtn.on{background:#f4d47a;color:#1a1208;border-color:#f4d47a}
  .step{display:flex;gap:6px;justify-content:center;align-items:center;margin:6px 0;flex-wrap:wrap}
  .step button{padding:7px 12px;border:1px solid #4a3d22;background:#241c14;color:#d8ccb6;border-radius:7px;font-size:13px;font-weight:700}
  .step button.on{background:#9ac63f;color:#15210a;border-color:#9ac63f}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,48px);gap:6px;max-width:240px;margin:6px auto}
  .pad button{border:1px solid #4a3d22;background:#2a2118;color:#f0e6d2;border-radius:9px;font-size:18px;font-weight:800}
  .pad .mid{background:#3a2d1c;font-size:12px}
  .val{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:#0d0a14;border:1px solid #2e2740;border-radius:6px;padding:8px;color:#cfeaff;text-align:center;margin:6px 0}
  .opts{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;font-size:14px;margin:8px 0}
  .opts label{display:flex;gap:6px;align-items:center}
  #sliders{padding:4px 2px}
  .sld{display:flex;align-items:center;gap:8px;padding:5px 6px;font-size:13px}
  .sld span{flex:0 0 92px;color:#cbb}
  .sld input[type=range]{flex:1}
  .sld b{flex:0 0 50px;text-align:right;font-family:ui-monospace,monospace;color:#bfe}
  .act{display:flex;gap:8px;margin:10px 0}
  .act button{flex:1;padding:12px;border-radius:8px;border:1px solid #4a3d22;font-size:15px;font-weight:800}
  #reset{background:#241c14;color:#d8ccb6}
  #exp{background:#9ac63f;color:#15210a;border-color:#9ac63f}
  textarea{width:100%;height:230px;background:#0d0a14;color:#bfe;border:1px solid #2e2740;border-radius:6px;font-family:ui-monospace,monospace;font-size:12px;padding:8px;margin-top:6px}
  #err{color:#ffb080;font-size:13px;text-align:center;padding:24px}
</style></head>
<body><div class="wrap">
<h1>第 1 幕 · 灰哨修院 · 遠征頁調校台</h1>
<p class="hint">① 點下方按鈕選一個部位 → ② 直接在圖上<b>拖曳</b>，或用十字鍵微調 → ③ 選到「群組」(5聖物格／路線卡／石板卡／頭像)時下方會出現額外滑桿(間距/尺寸/字級) → ④ 完成按「匯出參數」整段貼回給我。</p>
<div id="stage"><canvas id="cv" width="1704" height="786"></canvas><div id="err" style="display:none"></div></div>

<div class="row" id="targets"></div>
<div class="step">
  <span style="font-size:13px;color:#a99">步進</span>
  <button data-s="1">1</button><button data-s="5" class="on">5</button><button data-s="10">10</button>
</div>
<div class="pad">
  <div></div><button data-d="U">▲</button><div></div>
  <button data-d="L">◀</button><button class="mid" data-d="C">水平置中</button><button data-d="R">▶</button>
  <div></div><button data-d="D">▼</button><div></div>
</div>
<div class="val" id="val">—</div>
<div id="sliders"></div>

<div class="opts">
  <label><input type="checkbox" id="guide" checked> 中心線</label>
  <label><input type="checkbox" id="markers" checked> 部位標記</label>
</div>

<div class="act"><button id="reset">重設全部</button><button id="exp">匯出參數</button></div>
<textarea id="out" style="display:none" readonly></textarea>
</div>

<script>
const TAU=Math.PI*2, W=1704, H=786;
const IMG_URL="https://hoop-destroyer.vercel.app/assets/stage1_route_base_1704x786.webp";
const CLS=['#caa23a','#9a6fd0','#5a86d8','#b5483f','#9a6fd0'];   // 修血死裁裂 示意色
const RCHARS=['修','血','死','裁','裂'];
const ROUTES=[['速投線','2 菁英 + Boss｜約 7-9 分｜標準掉落'],['標準遠征','3 菁英 + Boss｜約 10-15 分｜較多聖物'],['腐化加時','3 腐化菁英 + Boss 變體｜失手 +20%｜標誌機率高']];
const STONES=[['無門捷徑','跳過一個菁英關，但 Boss +一組護衛'],['貪婪深路','聖物掉落提高，失手傷害 +20%'],['追獵者誓約','菁英比例提高，所有進球 XP +20%'],['不朽鎮印','本次遠征第一次失手不扣血'],['遠望之徑','顯示所有事件與標誌傾向'],['替補名單','每次升級可重抽，但 Boss 多一階段護衛']];

// === 預設版位 (與遊戲 _drawRouteArt 完全一致) ===
function DEF(){return{
  back:{t:'text',x:131,y:57,s:19,lbl:'返回'},
  title:{t:'text',x:852,y:50,s:30,lbl:'主標'},
  subtitle:{t:'text',x:852,y:86,s:15,lbl:'副標'},
  portrait:{t:'portrait',x:165,y:177,r:73,lbl:'頭像'},
  heroName:{t:'text',x:252,y:150,s:27,lbl:'角色名'},
  heroEn:{t:'text',x:252,y:184,s:17,lbl:'英文名'},
  heroRole:{t:'text',x:252,y:214,s:15,lbl:'定位'},
  relicLabel:{t:'text',x:525,y:140,s:16,lbl:'攜帶聖物字'},
  relics:{t:'relics',x:553,y:184,pitch:70,sz:52,lbl:'5聖物格'},
  bd:{t:'bd',x:525,y:242,s:14,tagX:566,lbl:'BD列'},
  changeBtn:{t:'text',x:1490,y:226,s:15,lbl:'回英雄頁'},
  routeHeader:{t:'text',x:293,y:290,s:20,lbl:'路線標題'},
  routeCard:{t:'routeCard',x:93,y0:355,dy:99,w:400,h:84,tx:96,nameDy:34,descDy:62,nameS:22,descS:13,lbl:'路線卡'},
  stonesHeader:{t:'text',x:1387,y:286,s:18,lbl:'石板標題'},
  stoneCard:{t:'stoneCard',col0:1285,col1:1490,y0:308,rowDy:137,cw:196,ch:122,nameDy:62,descDy:86,nameS:18,descS:14,lbl:'石板卡'},
  summary:{t:'text',x:852,y:686,s:15,lbl:'出戰摘要'},
  cta:{t:'text',x:853,y:737,s:26,lbl:'進入按鈕字'},
}}
const ORDER=['back','title','subtitle','portrait','heroName','heroEn','heroRole','relicLabel','relics','bd','changeBtn','routeHeader','routeCard','stonesHeader','stoneCard','summary','cta'];

let L=JSON.parse(localStorage.getItem('hb_rt_tuner')||'null')||DEF();
// 補欄位(舊存檔)
{const d=DEF();for(const k in d){if(!L[k])L[k]=d[k];else for(const f in d[k])if(L[k][f]===undefined)L[k][f]=d[k][f];}}
let sel='title', step=5;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const img=new Image();
img.onload=()=>{ready=true;draw();}; img.onerror=()=>{document.getElementById('err').style.display='block';document.getElementById('err').textContent='底圖載入失敗，請確認已部署 assets/stage1_route_base_1704x786.webp';};
let ready=false; img.src=IMG_URL;

function save(){localStorage.setItem('hb_rt_tuner',JSON.stringify(L));}
function T(str,x,y,size,col,align,weight,baseline){ctx.font=(weight||'700')+' '+size+'px "Noto Serif TC",Georgia,serif';ctx.textAlign=align||'left';ctx.textBaseline=baseline||'alphabetic';ctx.fillStyle=col;ctx.fillText(str,x,y);}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function wrapC(str,cx,y,maxw,lh,col,size){ctx.font='400 '+size+'px "Noto Serif TC",Georgia,serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=col;let line='',yy=y;for(const ch of str){if(ctx.measureText(line+ch).width>maxw&&line){ctx.fillText(line,cx,yy);line=ch;yy+=lh;}else line+=ch;}if(line)ctx.fillText(line,cx,yy);}

function draw(){
  if(!ready)return;
  ctx.clearRect(0,0,W,H); ctx.drawImage(img,0,0,W,H);
  // 中心線
  if(document.getElementById('guide').checked){ctx.strokeStyle='rgba(0,255,180,0.25)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();}
  // back
  T('← 返回',L.back.x,L.back.y,L.back.s,'#e9d9ad','center',700,'middle');
  // title/subtitle
  T('第 1 幕 · 灰哨修院',L.title.x,L.title.y,L.title.s,'#f0e3c6','center',800,'middle');
  T('出戰準備，選擇遠征路線與球路石板',L.subtitle.x,L.subtitle.y,L.subtitle.s,'#b6a888','center',400,'middle');
  // portrait
  {const p=L.portrait;ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fillStyle='rgba(255,200,112,0.10)';ctx.fill();ctx.strokeStyle='rgba(255,200,112,0.5)';ctx.lineWidth=2;ctx.stroke();T('頭像',p.x,p.y,20,'#ffcf80','center',700,'middle');ctx.restore();}
  // hero texts
  T('擦板蠻王',L.heroName.x,L.heroName.y,L.heroName.s,'#f1e7cf','left',800,'middle');
  T('Boardbarian',L.heroEn.x,L.heroEn.y,L.heroEn.s,'#b5483f','left',700,'middle');
  T('定位 · 戰斧 / 擦板',L.heroRole.x,L.heroRole.y,L.heroRole.s,'#cfc6b0','left',400,'middle');
  // relic label + 5 squares
  T('攜帶聖物 5/5',L.relicLabel.x,L.relicLabel.y,L.relicLabel.s,'#e6c068','left',700,'middle');
  {const r=L.relics;for(let i=0;i<5;i++){const cx=r.x+i*r.pitch;rr(cx-r.sz/2,r.y-r.sz/2,r.sz,r.sz,9);ctx.fillStyle=CLS[i]+'';ctx.globalAlpha=0.62;ctx.fill();ctx.globalAlpha=1;ctx.lineWidth=1.6;ctx.strokeStyle=CLS[i];ctx.stroke();T(RCHARS[i],cx,r.y,26,'#f7eed6','center',800,'middle');}}
  // BD
  T('BD',L.bd.x,L.bd.y,L.bd.s,'#a99c80','left',700,'middle');
  {let tx=L.bd.tagX;for(const tg of ['護盾','擦板','連擊','高風險']){ctx.font='700 15px Georgia,serif';const tw=ctx.measureText(tg).width+18;rr(tx,L.bd.y-14,tw,28,7);ctx.fillStyle='rgba(58,44,20,0.9)';ctx.fill();ctx.lineWidth=1.3;ctx.strokeStyle='rgba(200,160,70,0.5)';ctx.stroke();T(tg,tx+tw/2,L.bd.y,15,'#f0d8a0','center',700,'middle');tx+=tw+12;}}
  // change btn
  T('點此回英雄頁更換 ›',L.changeBtn.x,L.changeBtn.y,L.changeBtn.s,'#d8b878','center',700,'middle');
  // route header + 3 cards
  T('◆ 遠征路線 ◆',L.routeHeader.x,L.routeHeader.y,L.routeHeader.s,'#e6c068','center',800,'middle');
  {const c=L.routeCard;for(let i=0;i<3;i++){const y=c.y0+i*c.dy;const seld=(i===1);
    if(seld){rr(c.x,y,c.w,c.h,12);ctx.fillStyle='rgba(120,86,30,0.22)';ctx.fill();ctx.lineWidth=2.4;ctx.strokeStyle='rgba(240,200,110,0.95)';ctx.stroke();ctx.fillStyle='#f0c860';rr(c.x+4,y+12,6,c.h-24,3);ctx.fill();}
    T(ROUTES[i][0],c.x+c.tx,y+c.nameDy,c.nameS,seld?'#f4d27a':'#ece0c4','left',800,'middle');
    T(ROUTES[i][1],c.x+c.tx,y+c.descDy,c.descS,'#cabf9f','left',400,'middle');}}
  // stones header + 6 cards
  T('◆ 球路石板（可不選） ◆',L.stonesHeader.x,L.stonesHeader.y,L.stonesHeader.s,'#e6c068','center',800,'middle');
  {const c=L.stoneCard;const cols=[c.col0,c.col1];for(let i=0;i<6;i++){const col=i%2,row=(i/2)|0;const cx=cols[col],top=c.y0+row*c.rowDy;const seld=(i===0);const x=cx-c.cw/2;
    if(seld){rr(x,top,c.cw,c.ch,12);ctx.fillStyle='rgba(120,86,30,0.2)';ctx.fill();ctx.lineWidth=2.4;ctx.strokeStyle='rgba(240,200,110,0.95)';ctx.stroke();ctx.strokeStyle='#f0c860';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx+c.cw/2-22,top+20,8,0,TAU);ctx.stroke();}
    T(STONES[i][0],cx,top+c.nameDy,c.nameS,seld?'#f4d27a':'#ece0c4','center',800,'middle');
    wrapC(STONES[i][1],cx,top+c.descDy,c.cw-24,20,'#cabf9f',c.descS);}}
  // summary
  T('出戰摘要 ｜ 擦板蠻王　·　標準遠征　·　無門捷徑',L.summary.x,L.summary.y,L.summary.s,'#d8cba8','center',700,'middle');
  // cta
  T('進入第 1 幕',L.cta.x,L.cta.y,L.cta.s,'#ffe6b0','center',800,'middle');
  // 選中標記
  if(document.getElementById('markers').checked) mark();
}
function anchorOf(it){ if(it.t==='routeCard')return{x:it.x,y:it.y0}; if(it.t==='stoneCard')return{x:it.col0,y:it.y0}; return{x:it.x,y:it.y}; }
function mark(){const it=L[sel];const a=anchorOf(it);ctx.save();ctx.strokeStyle='#39ff88';ctx.fillStyle='rgba(57,255,136,0.18)';ctx.lineWidth=2;
  // 範圍框
  let bx,by,bw,bh;
  if(it.t==='portrait'){bx=it.x-it.r;by=it.y-it.r;bw=it.r*2;bh=it.r*2;}
  else if(it.t==='relics'){bx=it.x-it.sz/2-4;by=it.y-it.sz/2-4;bw=it.pitch*4+it.sz+8;bh=it.sz+8;}
  else if(it.t==='routeCard'){bx=it.x;by=it.y0;bw=it.w;bh=it.dy*2+it.h;}
  else if(it.t==='stoneCard'){bx=it.col0-it.cw/2;by=it.y0;bw=(it.col1-it.col0)+it.cw;bh=it.rowDy*2+it.ch;}
  else {bx=a.x-70;by=a.y-22;bw=140;bh=44;}
  rr(bx,by,bw,bh,8);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(a.x,a.y,9,0,TAU);ctx.fillStyle='#39ff88';ctx.fill();ctx.restore();}

// === UI ===
const tgts=document.getElementById('targets');
ORDER.forEach(k=>{const b=document.createElement('button');b.className='tbtn'+(k===sel?' on':'');b.textContent=L[k].lbl;b.onclick=()=>{sel=k;refresh();};b.dataset.k=k;tgts.appendChild(b);});
function refresh(){[...tgts.children].forEach(b=>b.classList.toggle('on',b.dataset.k===sel));buildSliders();updVal();draw();}
function updVal(){const it=L[sel];const a=anchorOf(it);document.getElementById('val').textContent=it.lbl+' → x:'+Math.round(a.x)+'  y:'+Math.round(a.y);}

document.querySelectorAll('.step button').forEach(b=>b.onclick=()=>{step=+b.dataset.s;document.querySelectorAll('.step button').forEach(x=>x.classList.toggle('on',x===b));});
document.querySelectorAll('.pad button[data-d]').forEach(b=>b.onclick=()=>{const d=b.dataset.d;const it=L[sel];
  if(d==='C'){ if(it.t==='routeCard'){} else if(it.t==='stoneCard'){} else if(it.t==='portrait'){it.x=W/2;} else it.x=W/2; }
  else{const dx=d==='L'?-step:d==='R'?step:0, dy=d==='U'?-step:d==='D'?step:0; movesel(dx,dy);} save();updVal();draw();});
function movesel(dx,dy){const it=L[sel];
  if(it.t==='routeCard'){it.x+=dx;it.y0+=dy;}
  else if(it.t==='stoneCard'){it.col0+=dx;it.col1+=dx;it.y0+=dy;}
  else{it.x+=dx;it.y+=dy;}}

// 拖曳
let drag=false,lastX,lastY;
function toImg(e){const r=cv.getBoundingClientRect();const sx=W/r.width,sy=H/r.height;const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};}
cv.addEventListener('pointerdown',e=>{drag=true;const p=toImg(e);lastX=p.x;lastY=p.y;cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{if(!drag)return;const p=toImg(e);movesel(p.x-lastX,p.y-lastY);lastX=p.x;lastY=p.y;save();updVal();draw();});
cv.addEventListener('pointerup',e=>{drag=false;});
cv.addEventListener('pointercancel',e=>{drag=false;});

// 滑桿
const SL={ text:[['s','字級',8,64]], portrait:[['r','半徑',30,140]], relics:[['pitch','格間距',40,110],['sz','格尺寸',30,80]],
  bd:[['s','字級',8,40],['tagX','標籤起點X',400,900]],
  routeCard:[['dy','行距',60,160],['w','卡寬',200,560],['h','卡高',50,140],['tx','文字左偏',40,200],['nameDy','名Y偏',10,70],['descDy','述Y偏',30,90],['nameS','名字級',12,40],['descS','述字級',8,28]],
  stoneCard:[['col0','左欄X',1100,1400],['col1','右欄X',1300,1600],['y0','首列Y',250,420],['rowDy','列距',90,180],['cw','卡寬',120,260],['ch','卡高',80,160],['nameDy','名Y偏',30,100],['descDy','述Y偏',50,120],['nameS','名字級',12,30],['descS','述字級',8,22]] };
function buildSliders(){const box=document.getElementById('sliders');box.innerHTML='';const it=L[sel];const defs=SL[it.t]||SL.text;
  defs.forEach(([key,label,mn,mx])=>{if(it[key]===undefined)return;const row=document.createElement('div');row.className='sld';
    row.innerHTML='<span>'+label+'</span><input type=range min='+mn+' max='+mx+' step=1 value='+it[key]+'><b>'+Math.round(it[key])+'</b>';
    const inp=row.querySelector('input'),bb=row.querySelector('b');inp.oninput=()=>{it[key]=+inp.value;bb.textContent=inp.value;save();draw();};box.appendChild(row);});}

document.getElementById('guide').onchange=draw;
document.getElementById('markers').onchange=draw;
document.getElementById('reset').onclick=()=>{if(confirm('重設所有版位為預設值？')){L=DEF();save();refresh();}};
document.getElementById('exp').onclick=()=>{const ta=document.getElementById('out');ta.style.display='block';
  let s='// 第1幕遠征頁版位 (貼回給 Claude)\n'+JSON.stringify(L,(k,v)=>typeof v==='number'?Math.round(v*10)/10:v,1);
  ta.value=s;ta.select();try{document.execCommand('copy');}catch(e){}};

refresh();
</script>
</body></html>
