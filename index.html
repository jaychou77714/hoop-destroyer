  /* 首次互動嘗試進入全螢幕 — 解決手機橫向瀏覽器列吃掉可視高度導致 UI 過小 */
  (function(){
    var done=false;
    function go(){
      if(done) return; done=true;
      var el=document.documentElement;
      var rq=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
      if(rq){ try{ var p=rq.call(el); if(p&&p.catch) p.catch(function(){}); }catch(e){} }
    }
    window.addEventListener('pointerdown', go, {once:true, passive:true});
    window.addEventListener('touchend', go, {once:true, passive:true});
  })();
