<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>籃框破壞神</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#150f22">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="manifest" href="manifest.json">
  <link rel="prefetch" href="./assets/atlas_base_clean_no_nodes_1704x786.webp">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="籃框破壞神">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #150f22;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    #ah-root {
      position: fixed;
      inset: 0;
      background: #150f22;
      overflow: hidden;
      touch-action: none;
    }
    #ah-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      -ms-touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #hb-loading {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background: #150f22;
      transition: opacity 220ms ease;
      pointer-events: none;
    }
    #hb-loading[hidden] {
      display: none;
    }
    #hb-loading.is-fading {
      opacity: 0;
    }
    #hb-loading .splash {
      width: min(100vw, 100vh * 1.7778);
      height: min(100vh, 100vw * 0.5625);
      background: url("./assets/ui/loading_splash_hoopbreaker.png") center / contain no-repeat;
    }
    #hb-loading .bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 6px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }
    #hb-loading .bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      background: linear-gradient(90deg, #ffcf56, #ff6a3d, #8de6ff);
      animation: hb-load 1.1s ease-in-out infinite;
    }
    #hb-error {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      display: none;
      padding: 12px 14px;
      border: 1px solid rgba(255, 112, 112, 0.45);
      border-radius: 8px;
      color: #ffe7e7;
      background: rgba(58, 17, 24, 0.94);
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      white-space: pre-wrap;
    }
    #hb-error.is-visible {
      display: block;
    }
    @keyframes hb-load {
      0% { transform: translateX(-105%); }
      55% { transform: translateX(95%); }
      100% { transform: translateX(240%); }
    }
  </style>
</head>
<body>
  <div id="ah-root">
    <canvas id="ah-canvas"></canvas>
  </div>
  <div id="hb-loading" aria-hidden="true">
    <div class="splash"></div>
    <div class="bar"></div>
  </div>
  <div id="hb-error" role="alert"></div>
  <script src="./engine.js"></script>
  <script>
    (function bootHoopbreaker() {
      var canvas = document.getElementById('ah-canvas');
      var root = document.getElementById('ah-root');
      var loading = document.getElementById('hb-loading');
      var errorBox = document.getElementById('hb-error');
      var game = null;
      var attempts = 0;

      function showError(err) {
        if (!errorBox) return;
        var msg = err && (err.stack || err.message || String(err));
        errorBox.textContent = '[Hoopbreaker] ' + (msg || 'Engine start failed');
        errorBox.className = 'is-visible';
      }

      function hideLoading() {
        if (!loading || loading.hidden) return;
        loading.className = 'is-fading';
        setTimeout(function () { loading.hidden = true; }, 260);
      }

      function tryStart() {
        attempts += 1;
        if (game && !game._dead) return;
        if (!canvas || !root || typeof window.HBStart !== 'function') {
          if (attempts < 80) setTimeout(tryStart, 100);
          else showError('HBStart was not exposed by engine.js');
          return;
        }
        try {
          game = window.HBStart(canvas, root);
          window.__HB = game;
          var ready = game && game._initialPreloadReady;
          if (ready && typeof ready.then === 'function') {
            ready.then(hideLoading, function (err) {
              if (window.console && console.warn) console.warn('[Hoopbreaker preload]', err);
              hideLoading();
            });
          } else {
            hideLoading();
          }
        } catch (err) {
          showError(err);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', tryStart, { once: true });
      } else {
        tryStart();
      }
    })();
  </script>
</body>
</html>
