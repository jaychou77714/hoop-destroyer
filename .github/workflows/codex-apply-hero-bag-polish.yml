name: Codex apply hero bag polish

on:
  push:
    paths:
      - '.github/workflows/codex-apply-hero-bag-polish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply hero bag polish
        run: |
          node <<'NODE'
          const fs = require('fs');
          const zlib = require('zlib');
          const marker = '// === final activation: hero relic backpack interaction polish ===';
          const gzB64 = '';
          const block = zlib.gunzipSync(Buffer.from(gzB64, 'base64')).toString('utf8').trimEnd() + '\n';
          let text = fs.readFileSync('engine.js', 'utf8');
          const idx = text.indexOf(marker);
          if (idx >= 0) text = text.slice(0, idx).trimEnd() + '\n\n';
          else text = text.trimEnd() + '\n\n';
          fs.writeFileSync('engine.js', text + block, 'utf8');
          NODE
          node --check engine.js
      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add engine.js
          git rm -f .github/workflows/codex-apply-hero-bag-polish.yml || true
          git commit -m "Polish hero relic bag interactions" || exit 0
          git push
