name: Codex apply hero bag polish

on:
  push:
    paths:
      - '.github/workflows/codex-apply-hero-bag-polish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Apply hero bag polish
        run: |
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const { execFileSync } = require('child_process');
          const marker = '// === final activation: hero relic backpack interaction polish ===';
          const expected = '5939f2c3bf07428fba7a3810d7ea93992f5f115c90d0223b37f77082344faf4b';
          const previous = execFileSync('git', ['show', 'HEAD^:.github/workflows/codex-apply-hero-bag-polish.yml'], { encoding: 'utf8', maxBuffer: 1024 * 1024 });
          const match = previous.match(/const payload = `([\s\S]*?)`\.replace/);
          if (!match) throw new Error('previous payload not found');
          const payload = match[1].replace(/\s+/g, '');
          const block = Buffer.from(payload, 'base64').toString('utf8');
          const actual = crypto.createHash('sha256').update(block, 'utf8').digest('hex');
          if (actual !== expected) throw new Error(`payload sha mismatch: ${actual}`);
          let text = fs.readFileSync('engine.js', 'utf8');
          const idx = text.indexOf(marker);
          if (idx >= 0) text = text.slice(0, idx).trimEnd() + '\n\n';
          else text = text.trimEnd() + '\n\n';
          fs.writeFileSync('engine.js', text + block, 'utf8');
          NODE
          node --check engine.js
      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add engine.js
          git rm -f .github/workflows/codex-apply-hero-bag-polish.yml || true
          git commit -m "Polish hero relic bag interactions"
          git push
