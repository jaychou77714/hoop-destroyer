name: Codex Apply Endless Button 2

"on":
  push:
    paths:
      - ".github/workflows/codex-apply-endless-button-20260628-2.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Patch final bench endless button
        shell: bash
        run: |
          node <<'NODE'
          const patch = Buffer.from(' nLnJlcGxhY2UoLyAvZywgJycpKTsKICAgICAgdGhpcy50b2FzdCgn54Sh55i95qih5byPJynlhaXljZXlt57mlbDmnInmna/liqjmnbAt77yM5LiL5LiA6ZqO5q61 ', 'base64').toString('utf8');
          eval(patch);
          NODE
      - name: Verify patched engine
        shell: bash
        run: |
          node --check engine.js
          grep -q "fb_endless_entry" engine.js
          ! grep -q "endlessAbyss" engine.js
          ! grep -q "final activation v5" engine.js
      - name: Commit patch and remove temporary workflows
        shell: bash
        run: |
          git config user.name "codex"
          git config user.email "codex@openai.com"
          rm -f .github/workflows/codex-apply-endless-button-20260628-1.yml
          rm -f .github/workflows/codex-apply-endless-button-20260628-2.yml
          git add engine.js .github/workflows/codex-apply-endless-button-20260628-1.yml .github/workflows/codex-apply-endless-button-20260628-2.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add final bench endless mode button"
            git push
          fi
