name: Codex Apply Leaderboard V4

on:
  push:
    paths:
      - .github/workflows/codex-apply-leaderboard-v4.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply leaderboard v4
        env:
          ENGINE_MARKER: "// === final activation v4: leaderboard data density and observer badge layout ==="
          ENGINE_SHA256: "020782dfe933b5a6520c2c07ad3621a7f8faaac7604e6fdfb1035ba2afa7b223"
          ENGINE_GZIP_BASE64: ""
        run: |
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const zlib = require('zlib');
          const marker = process.env.ENGINE_MARKER;
          const block = zlib.gunzipSync(Buffer.from(process.env.ENGINE_GZIP_BASE64, 'base64')).toString('utf8');
          const sha = crypto.createHash('sha256').update(block, 'utf8').digest('hex');
          if (sha !== process.env.ENGINE_SHA256) throw new Error('Block checksum mismatch: ' + sha);
          let engine = fs.readFileSync('engine.js', 'utf8');
          const idx = engine.indexOf(marker);
          if (idx >= 0) engine = engine.slice(0, idx).trimEnd() + '\n\n';
          else engine = engine.trimEnd() + '\n\n';
          fs.writeFileSync('engine.js', engine + block, 'utf8');
          NODE
      - name: Validate syntax
        run: node --check engine.js
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/codex-apply-leaderboard-v4.yml
          git add engine.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Polish daily leaderboard layout"
          git push
