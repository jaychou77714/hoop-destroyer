name: Codex apply leaderboard speed polish

on:
  push:
    paths:
      - '.github/workflows/codex-apply-leaderboard-speed-polish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply final v3 patch
        run: |
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const zlib = require('zlib');
          const marker = '// === final activation v3: daily leaderboard countdown, speed HUD and confirm safety ===';
          const payload = '';
          const block = zlib.gunzipSync(Buffer.from(payload, 'base64')).toString('utf8');
          const sha = crypto.createHash('sha256').update(block, 'utf8').digest('hex');
          if (sha !== '53dd7f3b963543976638b89b4823282b40c85452ff034d65cb97ce8e34b1a401') {
            throw new Error('patch payload sha mismatch: ' + sha);
          }
          let text = fs.readFileSync('engine.js', 'utf8');
          const idx = text.indexOf(marker);
          if (idx >= 0) text = text.slice(0, idx).trimEnd() + '\n\n';
          else text = text.trimEnd() + '\n\n';
          fs.writeFileSync('engine.js', text + block, 'utf8');
          NODE
          node --check engine.js
      - name: Commit patched engine
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/codex-apply-leaderboard-speed-polish.yml
          git add engine.js
          git status --short
          git commit -m "Polish leaderboard and speed mode UI" || exit 0
          git push
