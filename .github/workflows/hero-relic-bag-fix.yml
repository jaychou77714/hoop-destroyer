name: Hero Relic Bag Fix

on:
  push:
    branches:
      - main
    paths:
      - scripts/apply-hero-relic-bag-fix.js
      - .github/workflows/hero-relic-bag-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply hero relic bag patch
        run: node scripts/apply-hero-relic-bag-fix.js
